name: Create issue for new branch

on:
  push:
    branches:
      - 'feat/**'
      - 'fix/**'
  workflow_dispatch:

jobs:
  open-issue:
    runs-on: ubuntu-latest
    if: github.event.created == true
    permissions:
      issues: write

    steps:
      - name: Parse branch name
        id: parse
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          TYPE=$(echo "$BRANCH" | cut -d'/' -f1)
          NUMBER=$(echo "$BRANCH" | cut -d'/' -f2)
          echo "branch=$BRANCH"   >> "$GITHUB_OUTPUT"
          echo "type=$TYPE"       >> "$GITHUB_OUTPUT"
          echo "number=$NUMBER"   >> "$GITHUB_OUTPUT"

      - name: Create tracking issue
        uses: actions/github-script@v7
        env:
          BRANCH: ${{ steps.parse.outputs.branch }}
          TYPE: ${{ steps.parse.outputs.type }}
          NUMBER: ${{ steps.parse.outputs.number }}
          ACTOR: ${{ github.actor }}
        with:
          script: |
            const branch = process.env.BRANCH;
            const type   = process.env.TYPE;
            const number = parseInt(process.env.NUMBER, 10);
            const actor  = process.env.ACTOR;

            const labelColor = type === 'feat' ? '0075ca' : 'e4e669';
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                name:  type,
              });
            } catch {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                name:  type,
                color: labelColor,
              });
            }

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              labels: type,
              state: 'all',
              sort: 'created',
              direction: 'desc',
              per_page: 100,
            });
            /* Accept both bare `[feat/N]` and titled `[feat/N-short-title]`
               issue prefixes when scanning for the highest used number. */
            const regex = new RegExp(`^\\[${type}/(\\d+)(?:-[^\\]]*)?\\]`);
            let maxNumber = 0;
            for (const issue of issues.data) {
              const match = issue.title.match(regex);
              if (match) maxNumber = Math.max(maxNumber, parseInt(match[1], 10));
            }
            const nextCorrect = maxNumber + 1;

            let warningBlock = '';
            if (number !== nextCorrect) {
              warningBlock = [
                '> [!NOTE]',
                `> Branch \`${branch}\` uses number **${number}**, but the highest existing \`${type}\` issue is **${type}/${maxNumber}**.`,
                `> If this numbering gap is unintentional, consider recreating the branch as \`${type}/${nextCorrect}\`.`,
                '',
              ].join('\n');
            }

            const commits = context.payload.commits;
            const firstMessage = (commits && commits.length > 0)
              ? commits[0].message.trim()
              : '';
            const description = firstMessage || '<!-- Fill in a short description of the goal of this branch -->';
            const shortTitle = firstMessage
              ? firstMessage.split('\n')[0].slice(0, 72)
              : '';

            const { data: issue } = await github.rest.issues.create({
              owner:  context.repo.owner,
              repo:   context.repo.repo,
              title:  `[${branch}] ${shortTitle}`,
              labels: [type],
              body:   [
                warningBlock,
                `## Tracking branch \`${branch}\``,
                '',
                `**Branch:** \`${branch}\``,
                `**Type:** ${type === 'feat' ? 'Feature' : 'Bug fix'}`,
                `**Created by:** @${actor}`,
                '',
                '---',
                '',
                '### What does this branch do?',
                description,
                '',
                '### Notes',
                '<!-- Anything relevant: design decisions, links, test results -->',
                '',
                '---',
                `*This issue was opened automatically when branch \`${branch}\` was created.*`,
                `*Close it by merging the PR with \`Closes #<issue-number>\` in the description.*`,
              ].join('\n'),
            });

            console.log(`Issue #${issue.number} created: ${issue.html_url}`);

  update-issue-description:
    runs-on: ubuntu-latest
    if: github.event.created == false
    permissions:
      issues: write

    steps:
      - name: Parse branch name
        id: parse
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          TYPE=$(echo "$BRANCH" | cut -d'/' -f1)
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "type=$TYPE"     >> "$GITHUB_OUTPUT"

      - name: Fill issue description from first commit message
        uses: actions/github-script@v7
        env:
          BRANCH: ${{ steps.parse.outputs.branch }}
          TYPE: ${{ steps.parse.outputs.type }}
        with:
          script: |
            const branch  = process.env.BRANCH;
            const type    = process.env.TYPE;
            const commits = context.payload.commits;

            if (!commits || commits.length === 0) {
              console.log('No commits in this push, skipping.');
              return;
            }

            const firstMessage = commits[0].message.trim();

            const { data: issues } = await github.rest.issues.listForRepo({
              owner:    context.repo.owner,
              repo:     context.repo.repo,
              labels:   type,
              state:    'open',
              per_page: 50,
            });

            const branchIssue = issues.find(i => i.title.startsWith(`[${branch}]`));
            if (!branchIssue) {
              console.log('No open issue found for this branch, skipping.');
              return;
            }

            const placeholder = '<!-- Fill in a short description of the goal of this branch -->';
            if (!branchIssue.body.includes(placeholder)) {
              console.log('Description already filled in, skipping.');
              return;
            }

            const updatedBody = branchIssue.body.replace(placeholder, firstMessage);

            await github.rest.issues.update({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: branchIssue.number,
              body:         updatedBody,
            });

            console.log(`Issue #${branchIssue.number} updated with: "${firstMessage}"`);
