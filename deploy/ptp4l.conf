[global]
#
# gPTP / IEEE 802.1AS master for the Hesai ATX lidar on enp1s0.
# The ATX ships in 802.1AS mode (P2P peer-delay, transportSpecific=1,
# dst MAC 01:80:C2:00:00:0E). A default-1588v2 E2E master (transportSpecific=0)
# is invisible to it, which kept ptp_status=0 (free run). This profile matches.
#
# time_stamping software => ptp4l disciplines/serves CLOCK_REALTIME (system
# clock), so the lidar lands on the SAME clock as the micro-ROS IMU (uDV/USB).
# Do NOT switch to hardware timestamping without adding phc2sys, or the lidar
# would follow the NIC PHC (!= system clock) and drift from the IMU.
#
time_stamping           software
#
# --- clock identity / BMCA (unchanged from the 1588v2 baseline) ---
priority1               128
priority2               128
clockClass              248
clockAccuracy           0xFE
offsetScaledLogVariance 0xFFFF
domainNumber            0
slaveOnly               0
logging_level           6
#
# --- 802.1AS essentials (this is the actual fix vs the old E2E config) ---
network_transport       L2
delay_mechanism         P2P
transportSpecific       0x1
ptp_dst_mac             01:80:C2:00:00:0E
follow_up_info          1
path_trace_enabled      1
gmCapable               1
#
# --- 802.1AS default message rates (ATX emits Pdelay_Req ~1/s) ---
logAnnounceInterval     0
logSyncInterval         -3
logMinPdelayReqInterval 0
announceReceiptTimeout  3
syncReceiptTimeout      3
#
[enp1s0]
