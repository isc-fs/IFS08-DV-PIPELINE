# SLAM regression-test fixture.
#
# Each YAML in this directory pairs a bag with the SLAM-side
# expectations the regression suite checks. Format is intentionally
# small so adding more fixtures is mechanical:
#
#   bag_uri        — bag dir, relative to the repo root.
#   mode           — passed to slam_node's `~/setup` service as
#                    (mode_name=mode, behavior=mode). One of
#                    trackdrive / autocross / accel / skidpad / scruti.
#   description    — free text. Helps humans triage failures.
#   expectations.phase
#                  — `pre_rewrite` (current cone_graph_slam, used as
#                    a no-worse gate while the SLAM rewrite is in
#                    flight) or `post_rewrite` (the cone-landmark
#                    rewrite from #496+ that targets <1.5m drift).
#                    The regression test reads the phase and selects
#                    the matching thresholds below.
#   expectations.pose_error_*_m / yaw_error_*_deg
#                  — measured by scripts/replay_slam.py against the
#                    bag's /testing_only/odom (re-anchored to the
#                    SLAM's calibration-end frame, see
#                    `_publish_gt_aligned` in cone_graph_slam_node.py).
#   expectations.min_slam_pose_messages
#                  — sanity: replay must produce at least this many
#                    cone-scan steps. Catches the "slam_node never
#                    transitioned to SLAM_RUNNING" failure mode.
#   expectations.no_slam_crash
#                  — fail the test if replay_slam.py exits non-zero
#                    (any exception in the SLAM hot loop).

bag_uri: bags/autocross_no-track_20260517_172922
mode: autocross
description: >-
  First post-#528 autocross run with mc_backend's auto-pull working.
  Captured 2026-05-17 with full post-#526 odometry_filter stack. 63 s
  of driving, 600 cone scans, 1.18 GB. Reference baseline for the
  Phase 1 mapping rewrite: a rewrite that meets `post_rewrite`
  thresholds against this bag (pose < 1.5 m, yaw < 5°) is the SLAM
  Phase 0 deliverable.

# Drive the new two-phase SlamNode (Phase 1, #496) by default. The
# legacy cone_graph node stays accessible via `slam_node_legacy` but
# the regression gate now tracks the rewrite.
node_class: cone_slam.slam_node:SlamNode
# Phase 1 alone can't correct pose drift; the regression gate uses
# /testing_only/odom AS the pose feed so the residual reflects the
# mapping algorithm and Phase 1 ↔ snapshot consistency, not /odom
# drift. Switch to "odom" once Phase 2 lands and we want to gate
# end-to-end SLAM pose accuracy under production odometry.
pose_source: gt

expectations:
  phase: post_rewrite

  # pre_rewrite thresholds — measured by replay_slam.py on
  # 2026-05-17 against `cone_graph_slam_node` (PR #518 lineage).
  # Gate is "no worse than today plus 0.5 m / 2° slack" so a
  # cone_graph regression caught before the rewrite still fails CI.
  # Pose error swung between 0.1 m (first 8 s) and 25 m (turn cascade
  # by t=20 s); yaw error similarly. Cascade onset is the dominant
  # failure mode and is what the rewrite addresses.
  pre_rewrite:
    pose_error_max_m: 26.0
    pose_error_mean_m: 16.0
    yaw_error_max_deg: 38.0
    yaw_error_mean_deg: 24.0
    # Empirical: 569 residual rows on this bag (600 cone scans minus
    # the pre-SLAM_RUNNING calibration window where _latest_result is
    # still None and _record_scan returns early).
    min_slam_pose_messages: 560

  # post_rewrite thresholds — what the new two-phase SLAM must hit.
  # Phase 1's pose feed is GT (per Plan option-D) so residuals are
  # bounded by the snapshot's anchor-frame computation, not /odom
  # drift. Measured on 2026-05-17 against `cone_slam.slam_node:SlamNode`
  # commit 7372c4a: max=1.22 m, mean=0.81 m, yaw max=0.61°, yaw
  # mean=0.61°. Thresholds set to ~1.5× observed so a real algorithmic
  # regression fails CI while normal noise doesn't.
  post_rewrite:
    pose_error_max_m: 1.5
    pose_error_mean_m: 1.0
    yaw_error_max_deg: 2.0
    yaw_error_mean_deg: 1.0
    # Empirical: 599 residual rows (600 cone scans minus the 1-scan
    # warm-up before snapshot has both anchors set).
    min_slam_pose_messages: 580

  no_slam_crash: true

# Calibration window expectations. Used by future regression checks
# that verify the IMU bias estimator converged before the car
# started moving (the on_configure-vs-on_activate timing question we
# investigated this session).
calibration_window:
  expected_stationary: true
  duration_s: 3.0
